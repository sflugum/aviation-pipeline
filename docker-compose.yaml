services:
  # Bronze Layer: MySQL
  mysql-bronze:
    image: mysql:8.0
    container_name: mysql-bronze
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: bronze_db
      MYSQL_USER: bronze_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql

  # Gold Layer: PostgreSQL
  postgres-gold:
    image: postgres:15
    container_name: postgres-gold
    restart: always
    environment:
      POSTGRES_USER: gold_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gold_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
      - postgres-data:/var/lib/postgresql/data

volumes:
  mysql-data:
  postgres-data:


