spring.datasource.url=jdbc:mysql://localhost:3306/aviation_transactional
spring.datasource.username=aviation_user
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.ddl-auto=create
spring.jpa.properties.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.show-sql=true
spring.main.web-application-type=none
spring.batch.jdbc.initialize-schema=never
spring.docker.compose.enabled=false
