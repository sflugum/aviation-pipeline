services:
  # Source Database Simulation (MySQL)
  mysql-source:
    image: mysql:8.0
    container_name: mysql_aviation_source
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: aviation_transactional
      MYSQL_USER: aviation_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./src/main/resources/scripts/mysql_init/init.sql:/docker-entrypoint-initdb.d
      - ./data_drop:/var/lib/mysql-files
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5   

